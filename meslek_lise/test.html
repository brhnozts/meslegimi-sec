<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data: https:; connect-src 'self' https://akhkkghvhuggkkhqgejv.supabase.co; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self';" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=()" />
  <title>Lise Sonrası Test | Mesleğimi Seç</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../css/base-theme.css" />
</head>
<body id="top" data-module="lise" data-page="test">
  <div id="shell"></div>

  <section class="hero-section">
    <div class="container">
      <div class="glass-panel">
        <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4">
          <div>
            <h1 class="section-title mb-2">Lise Sonrası Meslek Testi</h1>
            <p class="section-text mb-0">Soruları ayrı sayfaya taşıdık; böylece öğrenci yalnızca seçime odaklanıyor.</p>
          </div>
          <div class="pill">İlerleme: <strong id="progressText">1 / 10</strong></div>
        </div>
        <div class="progress-wrap mb-4"><div class="progress-bar-custom" id="progressBar"></div></div>
        <div id="questionsContainer"></div>
        <div class="d-flex justify-content-between align-items-center mt-4 flex-wrap gap-2">
          <button class="btn btn-outline-secondary rounded-pill px-4" id="prevBtn" type="button">Geri</button>
          <div class="d-flex gap-2">
            <button class="btn btn-outline-dark rounded-pill px-4" id="restartBtn" type="button">Baştan Başla</button>
            <button class="btn btn-dark rounded-pill px-4" id="nextBtn" type="button">İleri</button>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script type="module" src="../js/page-init.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
